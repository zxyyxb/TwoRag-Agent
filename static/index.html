<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>数学辅导助手 · 两阶段多模态 RAG</title>
  <style>
    :root {
      --bg: #1a1b26;
      --surface: #24283b;
      --text: #c0caf5;
      --text-dim: #a9b1d6;
      --accent: #7aa2f7;
      --user-msg: #2d3a5e;
      --bot-msg: #1f2335;
      --border: #3b4261;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      font-size: 1rem;
      font-weight: 600;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-msg);
      border: 1px solid var(--border);
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-msg);
      border: 1px solid var(--border);
    }
    .msg .meta { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }
    .msg img.thumb { max-width: 200px; border-radius: 8px; margin-top: 8px; }
    #input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
    }
    #input-area textarea {
      flex: 1;
      min-width: 200px;
      min-height: 44px;
      max-height: 120px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      resize: vertical;
    }
    #input-area textarea::placeholder { color: var(--text-dim); }
    #image-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    #image-preview img {
      height: 48px;
      width: auto;
      max-width: 120px;
      object-fit: contain;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    #image-preview .remove {
      cursor: pointer;
      color: var(--text-dim);
      font-size: 12px;
    }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .loading { color: var(--text-dim); }
  </style>
</head>
<body>
  <header>数学辅导助手 · 两阶段多模态 RAG</header>

  <div id="chat"></div>

  <div id="input-area">
    <div style="flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 8px;">
      <textarea id="question" placeholder="输入题目或问题，例如：这题怎么做？" rows="1"></textarea>
      <div id="image-preview"></div>
    </div>
    <div style="display: flex; gap: 8px; align-items: center;">
      <label class="btn btn-ghost" style="cursor: pointer;">
        上传图片
        <input type="file" id="image-input" accept="image/*" style="display: none;" />
      </label>
      <button type="button" class="btn btn-primary" id="send">发送</button>
    </div>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const questionEl = document.getElementById("question");
    const imageInputEl = document.getElementById("image-input");
    const imagePreviewEl = document.getElementById("image-preview");
    const sendBtn = document.getElementById("send");

    let currentImageBase64 = null;

    function appendMessage(role, content, imageDataUrl) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = role === "user" ? "你" : "助手";
      div.appendChild(meta);
      const text = document.createElement("div");
      text.textContent = content || "(无文字)";
      div.appendChild(text);
      if (imageDataUrl && role === "user") {
        const img = document.createElement("img");
        img.className = "thumb";
        img.src = imageDataUrl;
        div.appendChild(img);
      }
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function setLoading(on) {
      sendBtn.disabled = on;
      sendBtn.textContent = on ? "思考中…" : "发送";
    }

    imageInputEl.addEventListener("change", function () {
      const file = this.files[0];
      if (!file || !file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = function () {
        currentImageBase64 = reader.result;
        imagePreviewEl.innerHTML = "";
        const img = document.createElement("img");
        img.src = reader.result;
        imagePreviewEl.appendChild(img);
        const span = document.createElement("span");
        span.className = "remove";
        span.textContent = "移除";
        span.onclick = function () {
          currentImageBase64 = null;
          imagePreviewEl.innerHTML = "";
          imageInputEl.value = "";
        };
        imagePreviewEl.appendChild(span);
      };
      reader.readAsDataURL(file);
    });

    sendBtn.addEventListener("click", async function () {
      const question = questionEl.value.trim();
      if (!question && !currentImageBase64) return;

      appendMessage("user", question || "(仅图片)", currentImageBase64);
      questionEl.value = "";
      const sentImage = currentImageBase64;
      currentImageBase64 = null;
      imagePreviewEl.innerHTML = "";
      imageInputEl.value = "";

      setLoading(true);
      const botPlaceholder = document.createElement("div");
      botPlaceholder.className = "msg bot loading";
      botPlaceholder.textContent = "正在检索与生成回答…";
      chatEl.appendChild(botPlaceholder);
      chatEl.scrollTop = chatEl.scrollHeight;

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question: question || "",
            image_base64: sentImage || null,
          }),
        });
        const data = await res.json();
        botPlaceholder.remove();
        if (data.ok) {
          appendMessage("bot", data.answer || "（无回复）");
        } else {
          appendMessage("bot", "错误：" + (data.error || "请求失败"));
        }
      } catch (e) {
        botPlaceholder.remove();
        appendMessage("bot", "请求失败：" + e.message);
      }
      setLoading(false);
    });

    questionEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });
  </script>
</body>
</html>
